name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # renovate: datasource=github-releases depName=goreleaser/goreleaser
  GORELEASER_VERSION: "v2.14.3"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          expected="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${expected}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain an exact semantic release tag, got: ${expected}." >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match VERSION (${expected})." >&2
            exit 1
          fi

      - name: Publish release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major version tag
        shell: bash
        run: |
          set -euo pipefail
          major="${GITHUB_REF_NAME%%.*}"
          git tag --force "${major}" "${GITHUB_SHA}"
          git push origin "refs/tags/${major}" --force
