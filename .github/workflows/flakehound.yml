name: Flakehound

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: flakehound-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  sniff:
    name: Diagnose failed CI
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check configuration
        id: config
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "${OPENAI_API_KEY}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          echo "## Flakehound skipped" >> "${GITHUB_STEP_SUMMARY}"
          echo "Repository secret \`OPENAI_API_KEY\` is not configured." >> "${GITHUB_STEP_SUMMARY}"

      - name: Diagnose CI failure
        if: steps.config.outputs.enabled == 'true'
        uses: rendaman0215/flakehound@v0.1.0
        with:
          repo: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          provider: openai
          version: v0.1.0
          comment: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
